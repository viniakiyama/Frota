<nav class="navbar navbar-expand-lg navbar-transparent  navbar-absolute bg-primary fixed-top">
  <div class="container-fluid">
    <div class="navbar-wrapper">
      <div class="navbar-toggle">
        <button type="button" class="navbar-toggler" (click)="sidebarToggle()">
          <span class="navbar-toggler-bar bar1"></span>
          <span class="navbar-toggler-bar bar2"></span>
          <span class="navbar-toggler-bar bar3"></span>
        </button>
      </div>
      <a class="navbar-brand" href="javascript:void(0)">{{getTitle()}}</a>
    </div>

    <button class="navbar-toggler" type="button" (click)="collapse()" [attr.aria-expanded]="!isCollapsed"
      aria-controls="collapseExample" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-bar navbar-kebab"></span>
      <span class="navbar-toggler-bar navbar-kebab"></span>
      <span class="navbar-toggler-bar navbar-kebab"></span>
    </button>

    <div class="collapse navbar-collapse justify-content-end" id="navigation">
      <ul class="navbar-nav">

        <li class="nav-item">
          <a class="nav-link" href="javascript:void(0)" style="cursor: default; display: flex; align-items: center;">
            <i class="now-ui-icons users_single-02" style="margin-right: 12px; font-size: 20px;"></i>

            <div style="display: flex; flex-direction: column; text-align: left; line-height: 1.1;">
              <span
                style="font-size: 12px; font-weight: 700; color: #333; text-transform: uppercase; letter-spacing: 0.5px;">
                {{ nomeUsuario }}
              </span>

              <span style="font-size: 10px; color: #777; font-weight: 400; margin-top: 2px;">
                {{ cargoUsuario }}
              </span>
            </div>
          </a>
        </li>

        <li class="nav-item dropdown" ngbDropdown>
          <a class="nav-link bell-link" ngbDropdownToggle id="navbarDropdownMenuLink">

            <i class="nc-icon nc-bell-55"></i>

            <span *ngIf="notificacoes.length > 0" class="notification-badge">
              {{ notificacoes.length }}
            </span>

            <p class="d-lg-none d-md-block" style="margin-left: 5px;">
              Notificações
            </p>
          </a>

          <div ngbDropdownMenu class="dropdown-menu dropdown-menu-right notification-menu"
            aria-labelledby="navbarDropdownMenuLink">
            <h6 class="dropdown-header">Alertas do Sistema</h6>

            <a *ngFor="let item of notificacoes" class="dropdown-item" [routerLink]="item.link">
              {{ item.mensagem }}
            </a>

            <div *ngIf="notificacoes.length === 0" class="dropdown-item text-muted justify-content-center">
              Nenhuma notificação nova
            </div>

          
          </div>
        </li>

        <li class="nav-item">
          <a class="nav-link text-danger" (click)="logout()"
            style="cursor: pointer; display: flex; align-items: center;">
            <i class="now-ui-icons media-1_button-power" style="margin-right: 5px;"></i>
            <p>
              <span class="d-lg-none d-md-block">Sair do Sistema</span>
              Sair
            </p>
          </a>
        </li>

      </ul>
    </div>
  </div>
