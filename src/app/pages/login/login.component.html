<div class="container d-flex justify-content-center align-items-center" style="height: 100vh;">
    <div class="card p-4 shadow-lg" style="width: 400px;">

        <div *ngIf="carregando" class="loading-bar"></div>

        <h3 class="text-center mb-4">Acesso ao Sistema</h3>
        <form [formGroup]="loginForm" (ngSubmit)="entrar()">
            <div class="form-group mb-3">
                <label>Usuário</label>
                <input type="text" formControlName="username" class="form-control" placeholder="Digite seu login" (input)="mensagemErro = ''">
            </div>
            <div class="form-group mb-4">
                <label>Senha</label>
                <input type="password" formControlName="senha" class="form-control" placeholder="******" (input)="mensagemErro = ''">
            </div>
            
            <button type="submit" class="btn btn-primary w-100" [disabled]="loginForm.invalid">ENTRAR</button>

            <div *ngIf="mensagemErro" class="text-center mt-3">
                <small class="text-danger font-weight-bold">
                    {{ mensagemErro }}
                </small>
            </div>

            <div class="text-center mt-3">
                <a routerLink="/registrar">Não tem conta? Registre-se aqui</a>
            </div>
        </form>
    </div>
</div>
